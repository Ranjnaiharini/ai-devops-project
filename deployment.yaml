apiVersion: apps/v1
kind: Deployment

metadata:
  name: ai-devops-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ai-devops-app

  template:
    metadata:
      labels:
        app: ai-devops-app

    spec:
      containers:
      - name: ai-devops-app
        image: ranjanikmsh/ai-devops-app:latest
        imagePullPolicy: Never

        ports:
        - containerPort: 5000